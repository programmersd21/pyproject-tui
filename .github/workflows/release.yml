name: Release

on:
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Build a snapshot instead of publishing a release"
        required: false
        default: "false"
      version:
        description: "Version to publish from VERSION"
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Load version
        shell: bash
        run: echo "VERSION=$(tr -d '\r\n' < VERSION)" >> "$GITHUB_ENV"
      - name: Verify version override
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ] && [ "${{ inputs.version }}" != "$VERSION" ]; then
            echo "VERSION file does not match the requested release version." >&2
            exit 1
          fi
      - name: Create release tag
        if: ${{ inputs.snapshot != 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists." >&2
            exit 1
          fi
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
      - name: Run GoReleaser snapshot
        if: ${{ inputs.snapshot == 'true' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean
        env:
          VERSION: ${{ env.VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser release
        if: ${{ inputs.snapshot != 'true' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          VERSION: ${{ env.VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
